services:
  mongo:
    image: mongo:7
    container_name: sortr-mongo
    restart: unless-stopped
    ports:
      # Use a non-default host port to avoid clashing with a local Windows mongod service.
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sortr-api
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app

  poller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sortr-imap-poller
    restart: unless-stopped
    depends_on:
      - mongo
    env_file: ./.env.local
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=sortr
      - IMAP_POLL_INTERVAL_SECONDS=15
      - IMAP_ONLY_UNSEEN=1
      - IMAP_LIMIT=50
      - IMAP_MAILBOX=INBOX
      - IMAP_MARK_SEEN=1
      - OPENAI_MODEL=o4-mini
    command: ["python", "-u", "-m", "app.imap_poller"]

volumes:
  mongo_data:
